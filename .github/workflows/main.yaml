name: Push (main)

on:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: python3 -m pip install tox
      - name: Run linters
        run: tox -e pep8

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: python -m pip install tox
      - name: Run tests
        run: tox -e py3

  release-to-charmhub:
    name: Release to CharmHub
    needs:
      - lint
      - unit-test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup LXD
        uses: canonical/setup-lxd@v0.1.1
        with:
          channel: 5.21/stable

      - name: Install charmcraft
        run: |
          # multi-base charmcraft.yaml requires charmcraft >= 4.1
          sudo snap install charmcraft --classic --channel=latest/candidate
          version=$(charmcraft version | awk '{print $2}')
          python3 - "$version" <<'PY'
          import re
          import sys

          version = sys.argv[1]
          match = re.match(r"(\d+)\.(\d+)", version)
          if not match or tuple(map(int, match.groups())) < (4, 1):
              raise SystemExit(f"Charmcraft {version} is too old; need >= 4.1")
          PY

      - name: Pack charm (multi-base)
        id: pack
        run: |
          charmcraft pack -v
          # Comma-separated list of all per-base/per-arch artifacts produced
          # by the multi-base charmcraft.yaml. Both upload-charm steps below
          # consume the same set so we only pack once.
          artifacts=$(printf '%s,' microceph_*.charm | sed 's/,$//')
          if [[ -z "${artifacts}" ]]; then
            echo "No microceph_*.charm artifacts produced by charmcraft pack" >&2
            exit 1
          fi
          echo "artifacts=${artifacts}" >> "${GITHUB_OUTPUT}"
          ls -al microceph_*.charm

      # Tagging is handled by charming-actions on the first upload step:
      # one GitHub tag per uploaded charmhub revision (so multi-base
      # publishes produce one tag per (base, arch) artifact, each
      # identifying its own revision). The second upload step releases
      # the same revisions to a second channel and skips tagging to
      # avoid colliding with the tags created above.
      - name: Release to latest/edge
        uses: canonical/charming-actions/upload-charm@2.7.0
        with:
          credentials: "${{ secrets.CHARMHUB_TOKEN }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          channel: latest/edge
          built-charm-path: "${{ steps.pack.outputs.artifacts }}"
          charmcraft-channel: latest/candidate

      - name: Release to squid/edge
        uses: canonical/charming-actions/upload-charm@2.7.0
        with:
          credentials: "${{ secrets.CHARMHUB_TOKEN }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          channel: squid/edge
          built-charm-path: "${{ steps.pack.outputs.artifacts }}"
          charmcraft-channel: latest/candidate
          github-tag: false
