# This file configures Charmcraft.
# See https://juju.is/docs/sdk/charmcraft-config for guidance.

type: charm
platforms:
  ubuntu-24.04-amd64:
    build-on: [ubuntu@24.04:amd64]
    build-for: [ubuntu@24.04:amd64]
  ubuntu-24.04-arm64:
    build-on: [ubuntu@24.04:arm64]
    build-for: [ubuntu@24.04:arm64]
  ubuntu-24.04-ppc64el:
    build-on: [ubuntu@24.04:ppc64el]
    build-for: [ubuntu@24.04:ppc64el]
  ubuntu-24.04-s390x:
    build-on: [ubuntu@24.04:s390x]
    build-for: [ubuntu@24.04:s390x]
  ubuntu-26.04-amd64:
    build-on: [ubuntu@26.04:amd64]
    build-for: [ubuntu@26.04:amd64]
  ubuntu-26.04-arm64:
    build-on: [ubuntu@26.04:arm64]
    build-for: [ubuntu@26.04:arm64]
  ubuntu-26.04-ppc64el:
    build-on: [ubuntu@26.04:ppc64el]
    build-for: [ubuntu@26.04:ppc64el]
  ubuntu-26.04-s390x:
    build-on: [ubuntu@26.04:s390x]
    build-for: [ubuntu@26.04:s390x]

parts:
  files:
    plugin: dump
    source: .
    stage:
      - files
  charm:
    after:
      - files
    plugin: uv
    source: .
    build-snaps:
      - astral-uv
    build-packages:
      - git
